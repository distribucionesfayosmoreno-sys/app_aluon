    <button

        <span class="material-symbols-outlined text-3xl">add</span>
    </button>
    <script>
            (function () {
                const select = document.getElementById("model-select");
                const preview = document.getElementById("model-preview");
                const title = document.getElementById("model-title");
                const desc = document.getElementById("model-desc");
                const tag = document.getElementById("model-tag");
                const heroTag = document.getElementById("model-hero-tag");
                const heroTitle = document.getElementById("model-hero-title");
                const heroDesc = document.getElementById("model-hero-desc");
                if (!select || !preview || !title || !desc || !tag || !heroTag || !heroTitle || !heroDesc) return;
                const updatePreview = () => {
                    const option = select.options[select.selectedIndex];
                    const img = option.getAttribute("data-img");
                    const titleText = option.getAttribute("data-title") || option.textContent || "Selected model";
                    const descText = option.getAttribute("data-desc") || "";
                    const tagText = (option.getAttribute("data-title") || "").split(" ")[1] || "";
                    preview.classList.remove("opacity-100");
                    preview.classList.add("opacity-0");
                    preview.classList.add("scale-105");
                    window.setTimeout(() => {
                        if (img) {
                            preview.src = img;
                            preview.alt = titleText;
                        }
                        title.textContent = titleText;
                        desc.textContent = descText;
                        tag.textContent = tagText;
                        heroTitle.textContent = titleText;
                        heroDesc.textContent = descText;
                        heroTag.textContent = "PREMIUM SERIES";
                        preview.classList.remove("opacity-0");
                        preview.classList.add("opacity-100");
                        preview.classList.remove("scale-105");
                        preview.classList.add("scale-100");
                    }, 220);
                };
                select.addEventListener("change", updatePreview);
                updatePreview();
            })();
    </script>
